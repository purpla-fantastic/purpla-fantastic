name: Generate Snake Game

on:
  schedule:
    # Запуск каждые 24 часа в полночь
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Вот твой блок с параметрами, встроенный в правильную структуру:
      - name: Snake Evolution
        uses: miccy/snake-evolution@v1.3.0
        with:
          github_user_name: purpla-fantastic
          github_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: dist/snake.svg
          theme: github-dark

      - name: Push snake.svg to output branch
        uses: CrazyMax/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
